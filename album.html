<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52期のアルバム - KPC52期 卒業演奏会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1714;
            font-family: 'Shippori Mincho', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 20;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Title */
        .album-header {
            text-align: center;
            padding: 50px 20px 20px;
            color: rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 5;
        }

        .album-header h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .album-header p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
        }

        /* Scattered photo area */
        .photo-scatter {
            position: relative;
            width: 100%;
            padding: 10px 0 80px;
        }

        .photo-card {
            position: relative;
            width: 70%;
            max-width: 340px;
            border-radius: 6px;
            overflow: visible;
            margin-bottom: -40px;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .photo-card.visible {
            opacity: 1;
        }

        .photo-card img {
            width: 100%;
            display: block;
            border-radius: 6px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5);
        }

        /* Footer */
        .album-footer {
            text-align: center;
            padding: 60px 20px 50px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            position: relative;
            z-index: 5;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">← 戻る</a>

    <div class="album-header">
        <h1>52期のアルバム</h1>
        <p>KPC 52期 卒業演奏会</p>
    </div>

    <div class="photo-scatter" id="photoScatter"></div>

    <div class="album-footer">
        <p>2026年3月18日 KPC 52期</p>
    </div>

    <script>
        const photos = [
            'albam/IMG_8886.JPG', 'albam/IMG_8887.JPG', 'albam/IMG_8888.JPG',
            'albam/IMG_8889.JPG', 'albam/IMG_8890.JPG', 'albam/IMG_8891.JPG',
            'albam/IMG_8892.JPG', 'albam/IMG_8893.JPG', 'albam/IMG_8894.JPG',
            'albam/IMG_8895.JPG', 'albam/IMG_8896.JPG', 'albam/IMG_8897.JPG',
            'albam/IMG_8898.JPG', 'albam/IMG_8899.JPG', 'albam/IMG_8900.JPG',
            'albam/IMG_8901.JPG', 'albam/IMG_8902.JPG', 'albam/IMG_8903.JPG',
            'albam/IMG_8904.JPG', 'albam/IMG_8905.JPG', 'albam/IMG_8906.JPG'
        ];

        const scatter = document.getElementById('photoScatter');

        // Random helpers
        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Create scattered photo cards
        photos.forEach((src, i) => {
            const card = document.createElement('div');
            card.className = 'photo-card';

            // Random horizontal position (left or right leaning, alternating with randomness)
            const side = i % 2 === 0 ? 'left' : 'right';
            const xOffset = rand(5, 25);
            const rotation = rand(-8, 8);

            if (side === 'left') {
                card.style.marginLeft = xOffset + '%';
            } else {
                card.style.marginLeft = (100 - 70 - xOffset) + '%';
            }

            card.style.transform = `rotate(${rotation}deg) translateY(20px)`;
            card.dataset.rotation = rotation;
            card.style.zIndex = i;

            const img = document.createElement('img');
            img.src = src;
            img.alt = `写真 ${i + 1}`;
            img.loading = i < 4 ? 'eager' : 'lazy';

            card.appendChild(img);
            scatter.appendChild(card);
        });

        // Scroll-triggered animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const rot = entry.target.dataset.rotation;
                    entry.target.classList.add('visible');
                    entry.target.style.transform = `rotate(${rot}deg) translateY(0)`;
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.photo-card').forEach(card => {
            observer.observe(card);
        });
    </script>

</body>

</html>
