<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フォント比較</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Old+Mincho:wght@400;700&family=Hina+Mincho&family=Klee+One:wght@400;600&family=Zen+Antique&family=Noto+Serif+JP:wght@400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fcfaf6;
            color: #5c534f;
            padding: 40px;
            font-family: 'Shippori Mincho', serif;
        }
        h2 { font-size: 14pt; color: #8c8378; margin-top: 40px; margin-bottom: 5px; font-weight: 400; }
        .label { font-size: 10pt; color: #a19a91; margin-bottom: 15px; }
        .sample {
            font-size: 32pt;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .sub { font-size: 14pt; letter-spacing: 0.2em; color: #8c8378; margin-bottom: 5px; }
        .card {
            border-bottom: 1px dashed #c9bda5;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }
        .current { background: rgba(201,189,165,0.1); padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 style="font-family: 'Shippori Mincho'; font-size: 16pt;">表紙タイトル フォント比較</h1>

    <div class="card current">
        <h2>① Yuji Syuku（現在使用中）</h2>
        <div class="label">柔らかく筆の温かみがある書体</div>
        <div class="sub" style="font-family: 'Yuji Syuku';">KPC 52期</div>
        <div class="sample" style="font-family: 'Yuji Syuku';">卒業<br>演奏会</div>
    </div>

    <div class="card">
        <h2>② Zen Old Mincho</h2>
        <div class="label">クラシカルで格調高い明朝体</div>
        <div class="sub" style="font-family: 'Zen Old Mincho';">KPC 52期</div>
        <div class="sample" style="font-family: 'Zen Old Mincho';">卒業<br>演奏会</div>
    </div>

    <div class="card">
        <h2>③ Hina Mincho</h2>
        <div class="label">繊細でやわらかい印象の明朝体</div>
        <div class="sub" style="font-family: 'Hina Mincho';">KPC 52期</div>
        <div class="sample" style="font-family: 'Hina Mincho';">卒業<br>演奏会</div>
    </div>

    <div class="card">
        <h2>④ Klee One</h2>
        <div class="label">手書き風のやさしい教科書体</div>
        <div class="sub" style="font-family: 'Klee One';">KPC 52期</div>
        <div class="sample" style="font-family: 'Klee One';">卒業<br>演奏会</div>
    </div>

    <div class="card">
        <h2>⑤ Zen Antique</h2>
        <div class="label">レトロで味のある書体</div>
        <div class="sub" style="font-family: 'Zen Antique';">KPC 52期</div>
        <div class="sample" style="font-family: 'Zen Antique';">卒業<br>演奏会</div>
    </div>

    <div class="card">
        <h2>⑥ Noto Serif JP</h2>
        <div class="label">すっきり整った現代的な明朝体</div>
        <div class="sub" style="font-family: 'Noto Serif JP';">KPC 52期</div>
        <div class="sample" style="font-family: 'Noto Serif JP';">卒業<br>演奏会</div>
    </div>

</body>
</html>
